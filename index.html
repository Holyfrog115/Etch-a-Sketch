<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Etch-a-Sketch</title>
    <link rel="stylesheet" href="styles.css">
    <script src="javascript.js" defer></script>
</head>
<body>
    <header>
        <div class="optionsMenu">
            <div class="buttons">
                <button id="newGrid">New Grid</button>
                <button id="reset">Reset</button>
                <div class="colors">
                    <div class="color">
                        <label for="gray" class="gray colors-label"></label>
                        <input type="radio" name="color" id="gray" checked>
                    </div>
                    <div class="color">
                        <label for="red" class="red colors-label"></label>
                        <input type="radio" name="color" id="red">
                    </div>
                    <div class="color">
                        <label for="green" class="green colors-label"></label>
                        <input type="radio" name="color" id="green">
                    </div>
                    <div class="color">
                        <label for="blue" class="blue colors-label"></label>
                        <input type="radio" name="color" id="blue">
                    </div>
                    <div class="color">
                        <label for="white" class="white colors-label"></label>
                        <input type="radio" name="color" id="white">
                    </div>
                </div>
            </div>
            <h1>Etch-a-Sketch</h1>
        </div>
        
    </header>
    <main>
        <div class="container"></div>
    </main>
</body>
</html>
